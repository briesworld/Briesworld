<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brie’s Website</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Quicksand',sans-serif;
background:linear-gradient(to bottom,#ffd6e7,#fff0f7,#f6e9ff);
color:#4a3a4f;
overflow-x:hidden;
}

/* NAV */
.navbar{
position:sticky;
top:0;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 20px rgba(255,182,217,0.3);
}

.logo{color:#ff4f9a;font-weight:bold;}

.nav-links a{
margin:0 10px;
padding:8px 12px;
border-radius:20px;
font-weight:bold;
}

.nav-links a:hover{background:#ffe0ef;}

/* HERO */
.hero{
height:90vh;
display:flex;
align-items:center;
justify-content:center;
}

.hero-card{
background:rgba(255,255,255,0.85);
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 25px rgba(255,105,180,0.2);
backdrop-filter:blur(10px);
}

.section{padding:60px 20px;}

.section-title{
text-align:center;
font-size:2rem;
margin-bottom:20px;
background:linear-gradient(45deg,#ff6fae,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* BUTTONS */
.small-btn{
background:#ff6fae;
color:white;
border:none;
padding:10px 18px;
border-radius:999px;
cursor:pointer;
font-weight:bold;
margin:5px;
}

.small-btn:hover{
background:#ff5aa2;
box-shadow:0 0 15px #ffb6d9;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.85);
padding:20px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
backdrop-filter:blur(10px);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px #ffb6d9;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
max-width:1000px;
margin:auto;
}

.gallery img{
width:100%;
border-radius:15px;
transition:0.3s;
}

.gallery img:hover{transform:scale(1.05);}

/* BOXES */
.box{
background:rgba(255,255,255,0.85);
padding:25px;
border-radius:20px;
max-width:700px;
margin:auto;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

/* CHAT */
#chatBox div{
background:#fff0f7;
padding:8px;
margin-bottom:5px;
border-radius:10px;
}

/* FLOAT TEXT */
.float{
position:fixed;
bottom:10px;
right:10px;
font-size:12px;
opacity:0.6;
}

/* INPUT */
input{
padding:10px;
border-radius:20px;
border:2px solid #ffd2e6;
margin:5px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
<div class="logo">🌸 Brie’s World</div>
<div class="nav-links">
<a href="#home">Home</a>
<a href="#gallery">Gallery</a>
<a href="#fun">Fun</a>
<a href="#chat">Chat</a>
</div>
</div>

<!-- HERO -->
<section class="hero" id="home">
<div class="hero-card">
<h1 id="typeText"></h1>
<p>Welcome to my cute internet world 🎀✨</p>
</div>
</section>

<!-- FAVORITES -->
<section class="section">
<h2 class="section-title">Favorites 💖</h2>
<div class="cards">
<div class="card">🎨 Art</div>
<div class="card">🎧 Music</div>
<div class="card">🌸 Aesthetic</div>
<div class="card">💻 Coding</div>
</div>
</section>

<!-- GALLERY -->
<section class="section" id="gallery">
<h2 class="section-title">Gallery 🫧</h2>
<div class="gallery">
<img src="https://i.pinimg.com/736x/8c/73/ef/8c73efa6c8fdcee4fd4fae95341e21a3.jpg">
<img src="https://i.pinimg.com/736x/51/fa/93/51fa9305d77a8457699370feed81b425.jpg">
<img src="https://i.pinimg.com/1200x/28/b4/94/28b494112bd8ade7bcadb637f4778ed4.jpg">
</div>
</section>

<!-- FUN -->
<section class="section" id="fun">
<h2 class="section-title">Fun Zone 🎀</h2>
<div class="box">

<button class="small-btn" onclick="confetti()">🎉</button>
<button class="small-btn" onclick="changeColor()">🎨</button>
<button class="small-btn" onclick="compliment()">💖</button>

<p id="complimentBox"></p>

<br>

<button onclick="mood('happy')">😊</button>
<button onclick="mood('sad')">🥺</button>
<button onclick="mood('confused')">🤨</button>
<button onclick="mood('hungry')">🍰</button>

<p id="moodText"></p>

</div>
</section>

<!-- CHAT -->
<section class="section" id="chat">
<h2 class="section-title">Chat Wall 💬</h2>
<div class="box">

<input id="chatName" placeholder="Name">
<input id="chatMessage" placeholder="Message">

<br>
<button class="small-btn" onclick="sendMessage()">Send</button>

<div id="chatBox"></div>

</div>
</section>

<div class="float">made with love 💖</div>

<!-- SCRIPTS -->
<script>
let text="Welcome to Brie’s Cute Website 🎀";
let i=0;
function type(){
if(i<text.length){
document.getElementById("typeText").innerHTML+=text.charAt(i);
i++;
setTimeout(type,50);
}}
type();

/* HEART CLICK */
document.addEventListener("click",e=>{
let heart=document.createElement("div");
heart.innerHTML="💗";
heart.style.position="fixed";
heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),800);
});

/* CONFETTI */
function confetti(){
for(let i=0;i<20;i++){
let x=document.createElement("div");
x.innerHTML="✨";
x.style.position="fixed";
x.style.left=Math.random()*window.innerWidth+"px";
x.style.top="0px";
document.body.appendChild(x);
let fall=setInterval(()=>x.style.top=parseInt(x.style.top)+5+"px",20);
setTimeout(()=>{clearInterval(fall);x.remove();},2000);
}}

/* COLOR */
function changeColor(){
let colors=[
"linear-gradient(#ffd6e7,#fff0f7)",
"linear-gradient(#e6ccff,#f6e9ff)",
"linear-gradient(#d4f1f9,#e6f7ff)"
];
document.body.style.background=colors[Math.floor(Math.random()*colors.length)];
}

/* COMPLIMENT */
function compliment(){
let c=["You’re iconic 💅","You’re amazing 💖","Main character 🎀"];
document.getElementById("complimentBox").innerText=c[Math.floor(Math.random()*c.length)];
}

/* MOOD */
function mood(t){
let m={
happy:"Yay!! 💖",
sad:"Hugs 🫂",
confused:"Take your time 🌸",
hungry:"Go eat 🍰"
};
document.getElementById("moodText").innerText=m[t];
}

/* CHAT WALL */
let messages=JSON.parse(localStorage.getItem("chatMessages"))||[];

function renderMessages(){
let box=document.getElementById("chatBox");
box.innerHTML="";
messages.forEach(m=>{
let d=document.createElement("div");
d.innerHTML="<b>"+m.name+":</b> "+m.text;
box.appendChild(d);
});
}

function sendMessage(){
let name=document.getElementById("chatName").value||"Anon";
let text=document.getElementById("chatMessage").value;
if(!text)return;
messages.push({name,text});
localStorage.setItem("chatMessages",JSON.stringify(messages));
document.getElementById("chatMessage").value="";
renderMessages();
}

renderMessages();
</script>

</body>
</html>
